<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KB Marketing — Production HQ</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23C4006B'/%3E%3Ctext x='50' y='68' font-family='Arial Black' font-size='46' font-weight='900' fill='white' text-anchor='middle'%3EKB%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{
  --forest:#1A1A1A; --stone:#4A4A4A; --water:#2E2E2E; --fire:#C4006B;
  --sky:#B5B5B5;   --earth:#E5338F; --lava:#7A0F4B; --teal:#9C6B85; --wind:#6E6E6E;
  --ink:#141414; --paper:#FFFFFF; --card:#FFFFFF; --muted:#8A8A8A;
  --radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--paper);color:var(--ink);
  background-image:radial-gradient(#ececec 1px, transparent 1px);background-size:26px 26px;}
h1,h2,h3{font-family:'Archivo Black',Inter,sans-serif;letter-spacing:.5px}
button{font-family:inherit;cursor:pointer;border:none}
input,select,textarea{font-family:inherit;font-size:14px}
a{color:var(--fire)}

nav{background:var(--ink);color:#fff;display:flex;align-items:center;gap:14px;
  padding:10px 22px;position:sticky;top:0;z-index:50;box-shadow:0 3px 14px rgba(0,0,0,.25);flex-wrap:wrap}
.logo-wrap{display:flex;align-items:center;gap:10px;cursor:pointer}
.logo-text{line-height:1}
.logo-text b{font-family:'Archivo Black';font-size:15px;display:block;letter-spacing:1px;color:#fff}
.logo-text span{font-size:9px;letter-spacing:4px;color:#E5338F;font-weight:700}
.tabs{display:flex;gap:4px;margin-left:8px;flex-wrap:wrap}
.tabs button{background:transparent;color:#bbb;padding:8px 13px;border-radius:9px;font-weight:600;font-size:13.5px}
.tabs button.active{background:#fff;color:var(--ink)}
.tabs button:hover:not(.active){background:rgba(255,255,255,.1);color:#fff}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:13px}
.event-switch{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.2);
  border-radius:9px;padding:7px 10px;font-weight:600;font-size:13px;max-width:230px}
.bell{position:relative;background:transparent;font-size:19px}
.bell .dot{position:absolute;top:-4px;right:-6px;background:var(--fire);color:#fff;font-size:10px;
  font-weight:800;border-radius:20px;padding:1px 5px}
.avatar{width:34px;height:34px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;
  font-weight:800;font-size:12px;color:#fff;flex:none;border:2px solid rgba(255,255,255,.4);cursor:pointer}

main{padding:26px 26px 70px;max-width:1500px;margin:0 auto}
.view-title{display:flex;align-items:baseline;gap:14px;margin-bottom:6px;flex-wrap:wrap}
.view-title h2{font-size:26px}
.view-title .sub{color:var(--muted);font-weight:600;font-size:13px}
.pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:800;color:#fff}

.home-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:20px;margin-top:18px}
.event-card{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:0 6px 18px rgba(0,0,0,.08);
  border-top:6px solid var(--fire);transition:transform .15s;border:1px solid #eee;border-top:6px solid var(--fire)}
.event-card:hover{transform:translateY(-3px)}
.event-card h3{font-size:18px;margin-bottom:2px}
.event-card .date{color:var(--muted);font-size:12.5px;font-weight:600;margin-bottom:14px}
.big-progress{background:#F0F0F0;height:14px;border-radius:10px;overflow:hidden;margin:6px 0 4px}
.big-progress i{display:block;height:100%;border-radius:10px;background:linear-gradient(90deg,#E5338F,#C4006B);transition:width .6s}
.pct-row{display:flex;justify-content:space-between;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:12px}
.minibars{display:flex;gap:5px;align-items:flex-end;margin:8px 0 14px;min-height:58px}
.minibar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;min-width:0}
.minibar{width:100%;border-radius:4px 4px 0 0;position:relative;background:#F0F0F0;height:44px;overflow:hidden}
.mb-lbl{font-size:8.5px;font-weight:800;color:var(--muted);letter-spacing:.3px;white-space:nowrap}
.minibar i{position:absolute;bottom:0;left:0;right:0;border-radius:3px 3px 0 0}
.card-foot{display:flex;align-items:center;justify-content:space-between}
.avatars{display:flex}
.avatars .avatar{width:28px;height:28px;font-size:10.5px;margin-left:-8px;border:2px solid #fff;cursor:default}
.avatars .avatar:first-child{margin-left:0}
.btn{background:var(--ink);color:#fff;padding:9px 16px;border-radius:10px;font-weight:700;font-size:13px}
.btn:hover{background:#333}
.btn.ghost{background:transparent;color:var(--ink);border:2px dashed #ccc}
.btn.orange{background:var(--fire)} .btn.orange:hover{background:#A00058}
.btn:disabled{opacity:.5;cursor:wait}
.new-event{border:3px dashed #ddd;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;
  min-height:220px;color:var(--muted);font-weight:700;cursor:pointer;font-size:15px;background:transparent}
.new-event:hover{border-color:var(--fire);color:var(--fire)}

.board-wrap{display:flex;gap:18px;align-items:flex-start;margin-top:16px}
.rail{display:flex;flex-direction:column;gap:7px;width:200px;flex:none}
.rcol{display:flex;align-items:center;gap:8px;color:#fff;border-radius:10px;padding:10px 13px;font-weight:800;
  font-size:12.5px;letter-spacing:.4px;text-transform:uppercase;text-align:left;opacity:.62;cursor:grab;
  box-shadow:0 3px 8px rgba(0,0,0,.10);transition:opacity .12s, transform .12s}
.rcol:hover{opacity:.85;transform:translateX(2px)}
.rcol.sel{opacity:1;outline:3px solid var(--fire);transform:translateX(4px)}
.rcol .rname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rcol .rcount{background:rgba(255,255,255,.28);border-radius:12px;font-size:11px;padding:2px 8px}
.rail .add-rail{border:2px dashed #ccc;background:transparent;border-radius:10px;padding:10px;font-weight:700;color:var(--muted);font-size:12.5px}
.rail .add-rail:hover{color:var(--fire);border-color:var(--fire)}
.open-col{flex:1;min-width:0;background:#fff;border:1px solid #eee;border-radius:var(--radius);
  box-shadow:0 5px 16px rgba(0,0,0,.06);padding-bottom:14px}
.notes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(235px,1fr));gap:16px;padding:16px 16px 4px}
@media (max-width:820px){
  .board-wrap{flex-direction:column}
  .rail{flex-direction:row;flex-wrap:wrap;width:100%}
  .rcol{padding:7px 11px}
}
.col-head{color:#fff;border-radius:var(--radius) var(--radius) 0 0;padding:11px 14px;display:flex;align-items:center;gap:8px}
.col-head h3{font-size:13.5px;letter-spacing:1px;text-transform:uppercase;flex:1}
.col-head .count{background:rgba(255,255,255,.25);border-radius:12px;font-size:11px;font-weight:800;padding:2px 8px}
.col-head button{background:rgba(255,255,255,.18);color:#fff;border-radius:7px;width:24px;height:24px;font-size:14px;font-weight:800}
.col-head button:hover{background:rgba(255,255,255,.35)}
.files-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:12px}
.file-chip{background:#fff;border:2px solid #e5e5e5;border-radius:20px;padding:6px 13px;font-size:12px;font-weight:700;color:var(--ink);display:inline-flex;gap:6px;align-items:center;cursor:pointer;text-decoration:none}
.file-chip:hover{border-color:var(--fire);background:#FDF2F8}
.col-prog{margin:10px 12px 0;background:#F0F0F0;height:7px;border-radius:6px;overflow:hidden}
.col-prog i{display:block;height:100%;border-radius:6px}

.note{background:var(--note-bg,#faf9f9);border-radius:6px;padding:12px 12px 10px;position:relative;cursor:pointer;
  box-shadow:2px 4px 9px rgba(0,0,0,.10);transition:transform .12s, box-shadow .12s;border-left:5px solid var(--note-c,#ccc);border-top:1px solid #eee;border-right:1px solid #eee;border-bottom:1px solid #eee}
.note:hover{transform:translateY(-2px);box-shadow:3px 6px 14px rgba(0,0,0,.15);z-index:2}
.note h4{font-family:'Inter',sans-serif;font-size:14px;line-height:1.3;font-weight:800;margin-bottom:4px}
.note p{font-family:'Inter',sans-serif;font-size:12.5px;color:#555;line-height:1.45;margin-bottom:8px;white-space:pre-wrap}
.note .meta{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.note .avatar{width:23px;height:23px;font-size:9.5px;border:none;cursor:inherit}
.note .who{font-size:11px;font-weight:700;color:#777;flex:1}
.note.done{opacity:.5}
.note.done h4{text-decoration:line-through}
.due{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:800;border-radius:12px;padding:3px 9px;margin-bottom:8px}
.chk{width:20px;height:20px;border-radius:6px;border:2px solid #bbb;background:#fff;display:inline-flex;
  align-items:center;justify-content:center;font-size:12px;color:#fff;flex:none}
.chk.on{background:var(--fire);border-color:var(--fire)}
.claude-chip{display:inline-flex;align-items:center;gap:4px;background:#fff;border:1.5px solid var(--note-c,#aaa);
  color:var(--ink);font-size:10.5px;font-weight:800;border-radius:14px;padding:3px 9px}
.claude-chip:hover{background:var(--ink);color:#fff}
.add-note{border:2px dashed #ddd;background:transparent;border-radius:8px;padding:9px;font-weight:700;
  color:var(--muted);font-size:12.5px;margin:0 12px}
.add-note:hover{color:var(--fire);border-color:var(--fire)}
.empty-board{margin:40px auto;text-align:center;color:var(--muted);font-weight:600;max-width:420px;line-height:1.6}

.my-grid{display:grid;grid-template-columns:1fr 330px;gap:20px;margin-top:18px}
.panel{background:#fff;border:1px solid #eee;border-radius:var(--radius);padding:20px;box-shadow:0 6px 18px rgba(0,0,0,.06)}
.panel h3{font-size:15px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.task-row{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:10px;background:#FAFAFA;margin-bottom:9px;border-left:5px solid var(--c);cursor:pointer}
.task-row .t{flex:1}
.task-row .t b{font-size:14px;display:block}
.task-row .t span{font-size:11.5px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.task-row.done b{text-decoration:line-through;opacity:.5}
.notif{display:flex;gap:10px;padding:10px 4px;border-bottom:1px solid #f0f0f0;font-size:13px;line-height:1.4}
.notif .ic{width:32px;height:32px;border-radius:9px;flex:none;display:flex;align-items:center;justify-content:center;font-size:15px;color:#fff}
.notif small{display:block;color:var(--muted);font-weight:600;margin-top:2px}
.notif.unread{background:#FDF2F8;border-radius:8px}
.msg-in{display:flex;gap:8px;margin-top:12px}
.msg-in input{flex:1;border:2px solid #e5e5e5;border-radius:9px;padding:9px 12px;background:#fafafa}
.msg-list{max-height:300px;overflow-y:auto}

.prog-wrap{display:grid;grid-template-columns:270px 1fr;gap:20px;margin-top:18px}
.donut{width:170px;height:170px;border-radius:50%;margin:14px auto;display:flex;align-items:center;justify-content:center;position:relative}
.donut::after{content:"";position:absolute;inset:20px;background:#fff;border-radius:50%}
.donut b{position:relative;z-index:1;font-family:'Archivo Black';font-size:34px}
.stat{text-align:center;font-weight:700;color:var(--muted);font-size:13px}
.bar-chart{display:flex;flex-direction:column;gap:13px;margin-top:8px}
.bar-row{display:grid;grid-template-columns:150px 1fr 90px;align-items:center;gap:14px}
.bar-row .lbl{font-weight:800;font-size:12.5px;text-transform:uppercase;letter-spacing:.6px;text-align:right}
.bar-track{background:#F0F0F0;height:24px;border-radius:8px;overflow:hidden}
.bar-track i{display:block;height:100%;border-radius:8px;transition:width .7s;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;
  color:#fff;font-size:11px;font-weight:800;min-width:fit-content}
.bar-row .cnt{font-size:12px;font-weight:700;color:var(--muted)}

.report{background:#fff;border:1px solid #eee;border-radius:var(--radius);padding:38px 44px;box-shadow:0 6px 18px rgba(0,0,0,.06);margin-top:18px;max-width:900px}
.report .rp-head{display:flex;justify-content:space-between;align-items:center;border-bottom:3px solid var(--ink);padding-bottom:16px;margin-bottom:22px}
.report h2{font-size:22px}
.rp-cat{margin-bottom:22px;page-break-inside:avoid}
.rp-cat h3{font-size:14px;text-transform:uppercase;letter-spacing:1px;display:flex;align-items:center;gap:9px;margin-bottom:8px}
.rp-cat .swatch{width:14px;height:14px;border-radius:4px;display:inline-block}
.rp-cat ul{list-style:none;margin:6px 0 0}
.rp-cat li{font-size:13px;padding:4px 0 4px 24px;position:relative;color:#444}
.rp-cat li.d::before{content:"✔";position:absolute;left:2px;color:var(--fire);font-weight:800}
.rp-cat li.t::before{content:"○";position:absolute;left:4px;color:#999;font-weight:800}

.login{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:26px;padding:30px}
.login-card{background:#fff;border:1px solid #eee;border-radius:20px;padding:38px 42px;box-shadow:0 20px 50px rgba(0,0,0,.12);width:400px;max-width:94vw;text-align:center}
.login-card input{width:100%;border:2px solid #e5e5e5;border-radius:10px;padding:12px 14px;margin-bottom:12px;background:#fafafa}
.login-err{color:var(--lava);font-size:13px;font-weight:700;margin-bottom:10px;min-height:18px}

.overlay{position:fixed;inset:0;background:rgba(10,10,10,.55);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;padding:26px;width:440px;max-width:95vw;box-shadow:0 24px 60px rgba(0,0,0,.3);max-height:90vh;overflow-y:auto}
.modal h3{font-size:17px;margin-bottom:16px}
.modal label{font-size:11.5px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);display:block;margin:12px 0 5px}
.modal input,.modal select,.modal textarea{width:100%;border:2px solid #e5e5e5;border-radius:9px;padding:10px 12px;background:#fafafa}
.modal .row{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;
  padding:12px 22px;border-radius:12px;font-weight:700;font-size:13.5px;box-shadow:0 10px 30px rgba(0,0,0,.3);
  opacity:0;transition:opacity .3s;z-index:200;pointer-events:none;max-width:90vw}
.toast.show{opacity:1}
.legend{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.legend span{font-size:10.5px;font-weight:800;color:#fff;border-radius:12px;padding:3px 10px;letter-spacing:.5px}
.member-row{display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid #f0f0f0}
.member-row .avatar{cursor:default}
.member-row .m{flex:1}
.member-row .m b{display:block;font-size:14px}
.member-row .m span{font-size:11.5px;color:var(--muted);font-weight:600}
.swatch-pick{display:flex;gap:7px;flex-wrap:wrap;margin-top:4px}
.swatch-pick button{width:28px;height:28px;border-radius:8px;border:3px solid transparent}
.swatch-pick button.sel{border-color:var(--fire)}
.loading{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;color:var(--muted);font-weight:700}

@media print{
  nav,.no-print{display:none!important}
  body{background:#fff}
  main{padding:0}
  .report{box-shadow:none;padding:10px}
}
@media (max-width:900px){.my-grid,.prog-wrap{grid-template-columns:1fr}}
</style>
</head>

let SESSION=null, ME=null, PROFILES=[], EVENTS=[], NOTIFS=[];
let cur = {cols:[], notes:[], files:[], msgs:[], atts:[], invs:[]};
let S = {event: localStorage.getItem('kb_event')||null, view:'home', col:null};
let pendingRefresh=false;

const $=id=>document.getElementById(id);
const usr=id=>PROFILES.find(u=>u.id===id);
const evRow=()=>EVENTS.find(e=>e.id===S.event);
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function abbr(name){const w=name.trim().split(/\s+/);return w.length>1?w.map(x=>x[0]).join('').toUpperCase():name.slice(0,3).toUpperCase();}
function tint(hex,a){return `color-mix(in srgb, ${hex} ${a}%, white)`;}
function toast(m){const t=$('toast');t.innerHTML=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
function fail(e){console.error(e);toast('⚠️ '+(e.message||e));}
function avatar(u){return u?`<span class="avatar" style="background:${u.color}" title="${esc(u.name)}">${u.initials}</span>`:'';}
function ago(ts){const s=(Date.now()-new Date(ts).getTime())/1000;
  if(s<60)return 'Just now'; if(s<3600)return Math.floor(s/60)+'m ago'; if(s<86400)return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';}
function dueState(n){
  if(!n.due_date||n.done)return null;
  const d=Math.ceil((new Date(n.due_date+'T23:59')-Date.now())/86400000);
  if(d<0)return{d,cls:'over'};
  if(d<=(n.warn_days??7))return{d,cls:'warn'};
  return{d,cls:'ok'};
}
function dueChip(n){
  if(!n.due_date)return '';
  const label=new Date(n.due_date+'T12:00').toLocaleDateString('en-ZA',{day:'numeric',month:'short'});
  const s=dueState(n);
  if(!s)return `<span class="due" style="background:rgba(0,0,0,.06);color:#888;opacity:.6">📅 ${label}</span>`;
  if(s.cls==='over')return `<span class="due" style="background:${C.lava};color:#fff">⚠ ${label} · ${-s.d}d overdue</span>`;
  if(s.cls==='warn')return `<span class="due" style="background:${C.earth};color:#fff">⏰ ${label} · ${s.d===0?'due today':'in '+s.d+'d'}</span>`;
  return `<span class="due" style="background:rgba(0,0,0,.07);color:#777">📅 ${label}</span>`;
}

async function loadCore(){
  const [p,e,n] = await Promise.all([
    sb.from('profiles').select('*').order('created_at'),
    sb.from('events').select('*').order('created_at'),
    sb.from('notifications').select('*').eq('user_id', SESSION.user.id).order('created_at',{ascending:false}).limit(30),
  ]);
  if(p.error)throw p.error; if(e.error)throw e.error; if(n.error)throw n.error;
  PROFILES=p.data; EVENTS=e.data; NOTIFS=n.data;
  ME=PROFILES.find(x=>x.id===SESSION.user.id)||null;
  if(!EVENTS.find(x=>x.id===S.event)) S.event = EVENTS[0]?.id || null;
}
async function loadEvent(){
  if(!S.event){cur={cols:[],notes:[],files:[],msgs:[],atts:[],invs:[]};return;}
  localStorage.setItem('kb_event', S.event);
  const [c,n,f,m,a,iv] = await Promise.all([
    sb.from('columns').select('*').eq('event_id',S.event).order('position'),
    sb.from('notes').select('*').eq('event_id',S.event).order('created_at'),
    sb.from('drive_links').select('*').eq('event_id',S.event).order('name'),
    sb.from('messages').select('*').eq('event_id',S.event).order('created_at',{ascending:false}).limit(30),
    sb.from('column_files').select('*').eq('event_id',S.event).order('created_at'),
    sb.from('invoices').select('*').eq('event_id',S.event).order('created_at'),
  ]);
  if(c.error)throw c.error; if(n.error)throw n.error; if(f.error)throw f.error; if(m.error)throw m.error; if(a.error)throw a.error; if(iv.error)throw iv.error;
  cur={cols:c.data,notes:n.data,files:f.data,msgs:m.data.reverse(),atts:a.data,invs:iv.data};
}
async function refresh(){ try{ await loadCore(); await loadEvent(); render(); }catch(e){fail(e);} }

let rt=null, rtTimer=null;
function subscribeRealtime(){
  if(rt) sb.removeChannel(rt);
  rt = sb.channel('db-changes')
    .on('postgres_changes',{event:'*',schema:'public'},()=>{
      clearTimeout(rtTimer);
      rtTimer=setTimeout(()=>{
        if($('overlay').classList.contains('open')){pendingRefresh=true;return;}
        refresh();
      },500);
    }).subscribe();
}

function statsFor(notes,colId){
  const ns=colId?notes.filter(n=>n.column_id===colId):notes;
  const d=ns.filter(n=>n.done).length;
  return {d,t:ns.length,p:ns.length?Math.round(d/ns.length*100):0};
}

  const {data:allInv}=await sb.from('invoices').select('event_id,kind,amount,paid,due_date');

  if(!confirm(`Delete “${c.name}” and all its notes?`))return;

  await loadEvent(); render();}catch(e){fail(e);}

let _dragCol=null;
function dragCol(id){_dragCol=id;}
async function dropCol(targetId){
  if(!_dragCol||_dragCol===targetId){_dragCol=null;return;}
  const from=cur.cols.findIndex(c=>c.id===_dragCol);
  const item=cur.cols.splice(from,1)[0];
  const to=cur.cols.findIndex(c=>c.id===targetId);
  cur.cols.splice(to,0,item); _dragCol=null; render();
  try{await Promise.all(cur.cols.map((c,i)=>sb.from('columns').update({position:i}).eq('id',c.id)));}catch(e){fail(e);}
}

  try{const {error}=await sb.from('drive_links').insert({event_id:S.event,name:name.trim(),url:url.trim()});
  if(error)throw error; await loadEvent(); render(); toast('📁 Drive folder linked');}catch(e){fail(e);}

async function uploadAttachment(input,colId){
  const file=input.files[0]; if(!file)return; input.value='';
  if(file.size>15*1024*1024){toast('Max file size is 15 MB');return;}
  toast('⬆️ Uploading '+esc(file.name)+'…');
  try{
    const path=S.event+'/'+colId+'/'+Date.now()+'_'+file.name.replace(/[^\w.\-]+/g,'_');
    const {error}=await sb.storage.from('attachments').upload(path,file); if(error)throw error;
    const {data}=sb.storage.from('attachments').getPublicUrl(path);
    const {error:e2}=await sb.from('column_files').insert({event_id:S.event,column_id:colId,name:file.name,path,url:data.publicUrl});
    if(e2)throw e2;
    await loadEvent(); render(); toast('📄 '+esc(file.name)+' attached');
  }catch(e){fail(e);}
}
async function delAttachment(id,path){
  if(!confirm('Remove this file from the category?'))return;
  try{
    await sb.storage.from('attachments').remove([path]);
    const {error}=await sb.from('column_files').delete().eq('id',id); if(error)throw error;
    await loadEvent(); render();
  }catch(e){fail(e);}
}

async function sendEmailNow(){
  const to=$('ml-to').value.trim(), subj=$('ml-subj').value.trim(), body=$('ml-body').value;
  if(!to||!subj||!body){toast('Recipient, subject and message are required');return;}
  const b=$('ml-go');b.disabled=true;b.textContent='Sending…';
  try{
    const {data:{session}}=await sb.auth.getSession();
    const res=await fetch(`${SUPABASE_URL}/functions/v1/send-email`,{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':`Bearer ${session.access_token}`},
      body:JSON.stringify({to,subject:subj,body}),
    });
    const j=await res.json();
    if(j.error==='NO_EMAIL'){toast('Connect your email first (avatar → Connect my email)');b.disabled=false;b.textContent='📧 Send reminder';return;}
    if(!res.ok||j.error)throw new Error(j.error||'Send failed');
    closeModal(); toast(`📧 Sent to ${to}`);
  }catch(e){fail(e);b.disabled=false;b.textContent='📧 Send reminder';}
}

  if(!name||!email||!pw){toast('Name, email and password are required');return;}
  const color=document.querySelector('#tm-colors button.sel')?.dataset.c||C.fire;
  const b=$('tm-go');b.disabled=true;
  try{
    const {data:{session}}=await sb.auth.getSession();
    const res=await fetch(`${SUPABASE_URL}/functions/v1/invite-user`,{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':`Bearer ${session.access_token}`},
      body:JSON.stringify({email,password:pw,name,role,color}),
    });
    const j=await res.json();
    if(!res.ok||j.error)throw new Error(j.error||'Could not create the account');
    await loadCore(); teamModal(); toast(`🎉 ${name.split(' ')[0]} added — they can sign in now`);
  }catch(e){fail(e);b.disabled=false;}
}
function connectEmailModal(){
  const dom=(ME.email.split('@')[1]||'');
  openModal(`<h3>📧 Connect my email</h3>
    <div style="font-size:12.5px;color:var(--muted);line-height:1.5;margin-bottom:4px">Lets the board send payment reminders from your own address. Your password is stored encrypted and never shown to anyone.</div>
    <label>Email address</label><input id="em-addr" value="${esc(ME.email)}">
    <label>Mail server (SMTP)</label><input id="em-host" value="mail.${esc(dom)}">
    <div style="display:flex;gap:12px">
      <div style="width:120px"><label>Port</label><input id="em-port" type="number" value="465"></div>
      <div style="flex:1"><label>Mailbox password</label><input id="em-pw" type="password" placeholder="Your email password"></div>
    </div>
    <div class="row"><button class="btn ghost" onclick="closeModal()">Cancel</button>
    <button class="btn orange" id="em-go" onclick="connectEmailSave()">Connect</button></div>`);
}
async function connectEmailSave(){
  const email=$('em-addr').value.trim(), host=$('em-host').value.trim(), pw=$('em-pw').value;
  if(!email||!host||!pw){toast('All fields are required');return;}
  const b=$('em-go');b.disabled=true;
  try{
    const {data:{session}}=await sb.auth.getSession();
    const res=await fetch(`${SUPABASE_URL}/functions/v1/email-connect`,{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':`Bearer ${session.access_token}`},
      body:JSON.stringify({email,smtp_host:host,smtp_port:parseInt($('em-port').value,10)||465,password:pw}),
    });
    const j=await res.json();
    if(!res.ok||j.error)throw new Error(j.error||'Could not save');
    await loadCore(); closeModal(); toast('📧 Email connected');
  }catch(e){fail(e);b.disabled=false;}
}
function changePwModal(){
  openModal(`<h3>🔑 Change my password</h3>
    <label>New password (min 8 characters)</label><input id="pw-new" type="password">
    <div class="row"><button class="btn ghost" onclick="teamModal()">Back</button>
    <button class="btn orange" onclick="changePw()">Update password</button></div>`);
}
async function changePw(){
  const pw=$('pw-new').value; if(pw.length<8){toast('Minimum 8 characters');return;}
  try{const {error}=await sb.auth.updateUser({password:pw}); if(error)throw error;
  closeModal(); toast('🔑 Password updated');}catch(e){fail(e);}
}

function openModal(html){$('modal').innerHTML=html;$('overlay').classList.add('open');}
function closeModal(){
  $('overlay').classList.remove('open');
  if(pendingRefresh){pendingRefresh=false;refresh();}
}
$('overlay').addEventListener('click',e=>{if(e.target.id==='overlay')closeModal();});

async function bootData(){
  try{
    await loadCore(); await loadEvent(); await loadHomeStats();
    subscribeRealtime(); render();
  }catch(e){ fail(e); render(); }
}
(async ()=>{
  const {data:{session}}=await sb.auth.getSession();
  SESSION=session;
  if(SESSION) await bootData(); else render();
  sb.auth.onAuthStateChange((_ev,s)=>{ SESSION=s; if(!s)render(); });
})();
</script>
</body>
</html>
